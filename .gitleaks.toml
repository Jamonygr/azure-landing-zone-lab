# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "Azure Landing Zone Lab - Gitleaks Config"

[extend]
useDefault = true

# Custom rules
[[rules]]
id = "azure-subscription-id"
description = "Azure Subscription ID"
regex = '''(?i)(subscription[_-]?id|subscriptionId)\s*[:=]\s*["']?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}["']?'''
keywords = ["subscription_id", "subscriptionId"]
entropy = 3.0

[[rules]]
id = "azure-storage-key"
description = "Azure Storage Account Key"
regex = '''(?i)(AccountKey|SharedAccessSignature)\s*=\s*[A-Za-z0-9+/=]{40,}'''
keywords = ["storage", "account", "key"]

[[rules]]
id = "terraform-state-secrets"
description = "Terraform State Secrets"
regex = '''(?i)(password|secret|key|token).*[=:].*["\'][^"\']{8,}["\']'''
path = '''\.tfstate$'''

# Allowlist - paths to ignore
[allowlist]
description = "Global allowlist"
regexTarget = "match"
paths = [
    '''\.terraform/''',
    '''\.terraform\.lock\.hcl$''',
    '''terraform\.tfstate$''',
    '''terraform\.tfstate\.backup$''',
    '''\.git/''',
    '''node_modules/''',
    '''vendor/''',
    '''tests/.*_test\.go$''',
]

# Regex patterns to ignore
regexes = [
    '''EXAMPLE''',
    '''example\.com''',
    '''localhost''',
    '''127\.0\.0\.1''',
    '''0\.0\.0\.0''',
    '''<.*>''',  # Placeholder values
    '''xxxxxxxx''',  # Masked values
    '''00000000-0000-0000-0000-000000000000''',  # Placeholder GUID
    '''11111111-1111-1111-1111-111111111111''',  # Mock Terraform subscription ID
    '''11111111-1111-4111-8111-111111111111''',  # RFC 4122-valid mock subscription ID
]

# Historical commits containing the same non-secret Azure subscription identifier.
# The current tree contains placeholders only; the identifier must still be rotated
# if it was ever paired with reusable credentials.
commits = [
    "91f1ed5242c8de3b005a4b85683329453775846f",
    "17eaf0b5d60dcd2bd9ca76c0f0221e5d5b7062e9",
]

# Stop words - common false positives
stopwords = [
    "example",
    "sample",
    "test",
    "fake",
    "mock",
    "dummy",
]
