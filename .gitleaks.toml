# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "Azure Landing Zone Lab - Gitleaks Config"

[extend]
useDefault = true

# Custom rules
[[rules]]
id = "azure-subscription-id"
description = "Azure Subscription ID"
regex = '''(?i)(subscription[_-]?id|subscriptionId)\s*[:=]\s*["']?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}["']?'''
keywords = ["subscription_id", "subscriptionId"]
entropy = 3.0

[[rules]]
id = "azure-storage-key"
description = "Azure Storage Account Key"
regex = '''(?i)(AccountKey|SharedAccessSignature)\s*=\s*[A-Za-z0-9+/=]{40,}'''
keywords = ["storage", "account", "key"]

[[rules]]
id = "terraform-state-secrets"
description = "Terraform State Secrets"
regex = '''(?i)(password|secret|key|token).*[=:].*["\'][^"\']{8,}["\']'''
path = '''\.tfstate$'''

# Allowlist - paths to ignore
[allowlist]
description = "Global allowlist"
paths = [
    '''\.terraform/''',
    '''\.terraform\.lock\.hcl$''',
    '''terraform\.tfstate$''',
    '''terraform\.tfstate\.backup$''',
    '''\.git/''',
    '''node_modules/''',
    '''vendor/''',
    '''tests/.*_test\.go$''',
    '''wiki/.*\.md$''',
]

# Regex patterns to ignore
regexes = [
    '''EXAMPLE''',
    '''example\.com''',
    '''localhost''',
    '''127\.0\.0\.1''',
    '''0\.0\.0\.0''',
    '''<.*>''',  # Placeholder values
    '''xxxxxxxx''',  # Masked values
    '''00000000-0000-0000-0000-000000000000''',  # Placeholder GUID
]

# Specific commits to ignore
commits = []

# Stop words - common false positives
stopwords = [
    "example",
    "sample",
    "test",
    "fake",
    "mock",
    "dummy",
]
