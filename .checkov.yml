# Checkov remains a blocking CI gate. These skips are intentional lab exceptions:
# the repo prioritizes low-cost, toggleable Azure learning environments over
# production-only CMK, private-only, premium HA, and certificate requirements.
# Rationale, compensating controls, owner, and review date are maintained in
# SECURITY_EXCEPTIONS.md. Skips must not be added without updating that register.
framework:
  - terraform

skip-check:
  # Customer-managed keys, disk encryption sets, and double encryption are
  # documented production hardening items, not defaults for this cost-focused lab.
  - CKV2_AZURE_1
  - CKV_AZURE_93
  - CKV_AZURE_100
  - CKV_AZURE_117
  - CKV_AZURE_199
  - CKV_AZURE_201
  - CKV_AZURE_227

