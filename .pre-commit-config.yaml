# Pre-commit configuration for Terraform
# Install: pip install pre-commit && pre-commit install

repos:
  # Cross-platform Terraform checks. These use the repository-pinned local tools
  # and avoid a hidden WSL/bash dependency on Windows.
  - repo: local
    hooks:
      - id: terraform_fmt
        name: Terraform Format
        language: system
        entry: pwsh -NoProfile -File scripts/invoke-pre-commit-check.ps1 -Check fmt
        pass_filenames: false
        files: '\.tf$'

      - id: terraform_validate
        name: Terraform Validate
        language: system
        entry: pwsh -NoProfile -File scripts/invoke-pre-commit-check.ps1 -Check validate
        pass_filenames: false
        files: '\.tf$'

      - id: terraform_tflint
        name: TFLint
        language: system
        entry: pwsh -NoProfile -File scripts/invoke-pre-commit-check.ps1 -Check tflint
        pass_filenames: false
        files: '\.tf$'

      - id: terraform_trivy
        name: Trivy IaC
        language: system
        entry: pwsh -NoProfile -File scripts/invoke-pre-commit-check.ps1 -Check trivy
        pass_filenames: false
        files: '\.tf$'

      - id: terraform_checkov
        name: Checkov
        language: system
        entry: pwsh -NoProfile -File scripts/invoke-pre-commit-check.ps1 -Check checkov
        pass_filenames: false
        files: '\.tf$'

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        name: Check for merge conflicts

      - id: end-of-file-fixer
        name: Fix end of files

      - id: trailing-whitespace
        name: Trim trailing whitespace

      - id: check-yaml
        name: Check YAML syntax
        args: ['--allow-multiple-documents']

      - id: check-json
        name: Check JSON syntax

      - id: detect-private-key
        name: Detect private keys

      - id: no-commit-to-branch
        name: Prevent commits to main
        args: ['--branch', 'main']

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: Detect secrets

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        name: Markdown lint
        args: ['--fix']

  - repo: local
    hooks:
      - id: generated-terraform-docs
        name: Generated Terraform documentation
        language: system
        entry: pwsh -NoProfile -File scripts/generate-terraform-docs.ps1 -Check
        pass_filenames: false
        files: '(^|/)([^/]+\.tf|\.terraform-docs\.yml)$'
      - id: markdown-links
        name: Markdown links
        language: system
        entry: pwsh -NoProfile -File scripts/test-markdown-links.ps1
        pass_filenames: false
        files: '\.md$'
