name: 'State Backup'
description: 'Backup Terraform state before changes'

inputs:
  azure_client_id:
    description: 'Azure client/application ID for OIDC'
    required: true
  azure_tenant_id:
    description: 'Azure tenant ID for OIDC'
    required: true
  azure_subscription_id:
    description: 'Azure subscription ID for OIDC'
    required: true
  storage_account:
    description: 'State storage account'
    required: true
  resource_group:
    description: 'State resource group'
    required: true
  container:
    description: 'State container'
    required: false
    default: 'tfstate'
  state_key:
    description: 'State file key'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: Create Backup Container if Missing
      shell: bash
      run: |
        az storage container create \
          --account-name "${{ inputs.storage_account }}" \
          --name "${{ inputs.container }}-backups" \
          --auth-mode login \
          --only-show-errors

    - name: Backup State
      shell: bash
      run: |
        set -euo pipefail
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        BACKUP_NAME="${{ inputs.state_key }}.backup-${TIMESTAMP}"

        STATE_EXISTS=$(az storage blob exists \
          --account-name "${{ inputs.storage_account }}" \
          --container-name "${{ inputs.container }}" \
          --name "${{ inputs.state_key }}" \
          --auth-mode login \
          --only-show-errors \
          --query exists \
          --output tsv)

        if [ "$STATE_EXISTS" != "true" ]; then
          echo "## 💾 State Backup" >> "$GITHUB_STEP_SUMMARY"
          echo "No existing state blob found for first-run deployment; backup skipped." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        az storage blob copy start \
          --account-name "${{ inputs.storage_account }}" \
          --destination-container "${{ inputs.container }}-backups" \
          --destination-blob "$BACKUP_NAME" \
          --source-account-name "${{ inputs.storage_account }}" \
          --source-container "${{ inputs.container }}" \
          --source-blob "${{ inputs.state_key }}" \
          --auth-mode login \
          --only-show-errors

        echo "## 💾 State Backup" >> "$GITHUB_STEP_SUMMARY"
        echo "Backed up state to: $BACKUP_NAME" >> "$GITHUB_STEP_SUMMARY"
