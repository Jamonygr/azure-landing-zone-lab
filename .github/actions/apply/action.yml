name: 'Terraform Apply'
description: 'Apply Terraform plan'

inputs:
  terraform_version:
    description: 'Terraform version'
    required: false
    default: '1.15.8'
  working_directory:
    description: 'Working directory'
    required: false
    default: '.'
  azure_client_id:
    description: 'Azure client/application ID for OIDC'
    required: true
  azure_tenant_id:
    description: 'Azure tenant ID for OIDC'
    required: true
  azure_subscription_id:
    description: 'Azure subscription ID for OIDC'
    required: true
  backend_resource_group:
    description: 'Backend resource group'
    required: true
  backend_storage_account:
    description: 'Backend storage account'
    required: true
  backend_container:
    description: 'Backend container'
    required: false
    default: 'tfstate'
  state_key:
    description: 'State file key'
    required: true
  environment:
    description: 'Environment name'
    required: true
  plan_artifact:
    description: 'Plan artifact name'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
        terraform_wrapper: false

    - name: Azure Login
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: Set ARM Environment Variables
      shell: bash
      run: |
        echo "ARM_USE_OIDC=true" >> $GITHUB_ENV
        echo "ARM_USE_AZUREAD=true" >> $GITHUB_ENV
        echo "ARM_CLIENT_ID=${{ inputs.azure_client_id }}" >> $GITHUB_ENV
        echo "ARM_SUBSCRIPTION_ID=${{ inputs.azure_subscription_id }}" >> $GITHUB_ENV
        echo "ARM_TENANT_ID=${{ inputs.azure_tenant_id }}" >> $GITHUB_ENV

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        terraform init -lockfile=readonly \
          -backend-config="resource_group_name=${{ inputs.backend_resource_group }}" \
          -backend-config="storage_account_name=${{ inputs.backend_storage_account }}" \
          -backend-config="container_name=${{ inputs.backend_container }}" \
          -backend-config="key=${{ inputs.state_key }}" \
          -backend-config="use_azuread_auth=true"

    - name: Download Plan
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.plan_artifact }}
        path: ${{ inputs.working_directory }}

    - name: Terraform Apply
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform apply -auto-approve tfplan

    - name: Summary
      shell: bash
      run: |
        echo "## ✅ Applied - ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        echo "Deployed by @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
