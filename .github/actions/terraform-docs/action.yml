name: 'Terraform Docs'
description: 'Auto-generate Terraform documentation'

inputs:
  working_directory:
    description: 'Working directory'
    required: false
    default: '.'
  output_file:
    description: 'Output file for docs'
    required: false
    default: 'TERRAFORM.md'
  config_file:
    description: 'terraform-docs config file'
    required: false
    default: '.terraform-docs.yml'
  recursive:
    description: 'Generate docs for modules recursively'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup terraform-docs
      shell: bash
      run: |
        set -euo pipefail
        curl --fail --location --retry 5 --output terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.24.0/terraform-docs-v0.24.0-linux-amd64.tar.gz
        echo "9005daf969de0b50134493a2c00078b49f5f5b39d021cda7c89bf4d4f3d776d3  terraform-docs.tar.gz" | sha256sum --check
        tar -xzf terraform-docs.tar.gz
        chmod +x terraform-docs
        sudo mv terraform-docs /usr/local/bin/

    - name: Generate Documentation
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        pwsh -NoProfile -File scripts/generate-terraform-docs.ps1 -Check
        echo "## Terraform documentation is current" >> "$GITHUB_STEP_SUMMARY"
