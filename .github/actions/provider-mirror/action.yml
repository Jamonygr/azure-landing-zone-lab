name: Terraform Provider Cache
description: Cache providers while preserving lock-file checksum verification

runs:
  using: composite
  steps:
    - name: Restore provider cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.terraform.d/plugin-cache
        key: terraform-provider-cache-${{ runner.os }}-${{ hashFiles('.terraform.lock.hcl') }}

    - name: Configure provider cache
      shell: bash
      run: |
        set -euo pipefail
        cache_dir="$HOME/.terraform.d/plugin-cache"
        mkdir -p "$cache_dir"
        echo "TF_PLUGIN_CACHE_DIR=$cache_dir" >> "$GITHUB_ENV"
        echo "Provider packages remain verified against .terraform.lock.hcl."
