name: 'Graph Visualization'
description: 'Generate Terraform dependency graph'

inputs:
  working_directory:
    description: 'Working directory'
    required: false
    default: '.'
  output_format:
    description: 'Output format (svg, png, pdf)'
    required: false
    default: 'svg'

runs:
  using: 'composite'
  steps:
    - name: Install Graphviz
      shell: bash
      run: sudo apt-get install -y graphviz

    - name: Generate Graph
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        GRAPH_DIR="$RUNNER_TEMP/terraform-graph"
        mkdir -p "$GRAPH_DIR"

        terraform init -backend=false -lockfile=readonly
        terraform graph > "$GRAPH_DIR/graph.dot"
        dot -T${{ inputs.output_format }} "$GRAPH_DIR/graph.dot" -o "$GRAPH_DIR/terraform-graph.${{ inputs.output_format }}"

        echo "## 🗺️ Infrastructure Graph" >> $GITHUB_STEP_SUMMARY
        echo "Graph generated successfully. Download from artifacts." >> $GITHUB_STEP_SUMMARY

    - name: Upload Graph
      uses: actions/upload-artifact@v4
      with:
        name: terraform-graph
        path: ${{ runner.temp }}/terraform-graph/terraform-graph.${{ inputs.output_format }}
        retention-days: 30
