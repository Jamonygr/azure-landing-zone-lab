name: Terraform Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.tftest.hcl'
      - '.github/**'
      - 'modules/**'
      - 'landing-zones/**'
      - 'environments/**'
      - 'policies/**'
      - 'scripts/**'
      - '*.md'
      - 'wiki/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.tftest.hcl'
      - '.github/**'
      - 'modules/**'
      - 'landing-zones/**'
      - 'environments/**'
      - 'policies/**'
      - 'scripts/**'
      - '*.md'
      - 'wiki/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        default: lab
        type: choice
        options: [cheap-lab, lab, dev, prod]
      action:
        description: Action
        required: true
        default: plan
        type: choice
        options: [plan, apply, destroy]
      destroy_confirm:
        description: Type "DESTROY <environment>" to confirm a destroy
        required: false
        type: string

concurrency:
  group: terraform-${{ github.ref }}-${{ github.event.inputs.environment || 'lab' }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TF_VERSION: 1.15.8
  TFLINT_VERSION: v0.63.1
  TRIVY_VERSION: v0.72.0
  ENVIRONMENT: ${{ github.event.inputs.environment || 'lab' }}
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_REGISTRY_CLIENT_TIMEOUT: 60
  TF_REGISTRY_DISCOVERY_RETRY: 5

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive -diff

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: ./.github/actions/provider-mirror
      - run: terraform init -backend=false -lockfile=readonly
      - run: terraform validate -no-color

  terraform-test:
    name: Terraform Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: ./.github/actions/provider-mirror
      - run: terraform init -backend=false -lockfile=readonly
      - run: terraform test -no-color

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
      - run: tflint --init
      - run: tflint --recursive

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan Terraform
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore.yaml
      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan Terraform
        run: >-
          docker run --rm
          --volume "$PWD:/workspace"
          --workdir /workspace
          bridgecrew/checkov@sha256:51bebaca76536e985118a6af41ff4811a1b909a5e370492a955b4b6c82da6a88
          --directory .
          --config-file .checkov.yml
          --compact

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  policy-check:
    name: Policy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Conftest
        shell: bash
        run: |
          set -euo pipefail
          archive=conftest_0.68.2_Linux_x86_64.tar.gz
          curl --fail --location --retry 5 --output "$RUNNER_TEMP/$archive" \
            "https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/$archive"
          echo "e8144c6d6d2ae0260b869caa60c7c262a1f95ac63ec1e5d2fb19be452d606347  $RUNNER_TEMP/$archive" | sha256sum --check
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" conftest
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - run: conftest test tests/policy/secure-plan.json --policy policies --all-namespaces
      - name: Verify insecure fixture is denied
        shell: bash
        run: |
          if conftest test tests/policy/insecure-plan.json --policy policies --all-namespaces; then
            echo "The intentionally insecure plan was not denied." >&2
            exit 1
          fi

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install terraform-docs
        shell: bash
        run: |
          set -euo pipefail
          archive=terraform-docs-v0.24.0-linux-amd64.tar.gz
          curl --fail --location --retry 5 --output "$RUNNER_TEMP/$archive" \
            "https://github.com/terraform-docs/terraform-docs/releases/download/v0.24.0/$archive"
          echo "9005daf969de0b50134493a2c00078b49f5f5b39d021cda7c89bf4d4f3d776d3  $RUNNER_TEMP/$archive" | sha256sum --check
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" terraform-docs
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - shell: pwsh
        run: ./scripts/generate-terraform-docs.ps1 -Check
      - name: Check Markdown links
        shell: pwsh
        run: ./scripts/test-markdown-links.ps1

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.23.x'
          cache: false
      - run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - run: actionlint

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tests/go.mod
          cache-dependency-path: tests/go.sum
      - run: go test -v -timeout 10m ./...
        working-directory: tests

  cost-estimate:
    name: Cost Estimate
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: ./.github/actions/provider-mirror
      - run: terraform init -backend=false -lockfile=readonly
      - uses: ./.github/actions/cost-estimate
        with:
          api_key: ${{ secrets.INFRACOST_API_KEY }}
          var_file: environments/${{ env.ENVIRONMENT }}.tfvars
        continue-on-error: true

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [format, validate, terraform-test, tflint, trivy, checkov, gitleaks, policy-check, docs, actionlint, go-test]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: ${{ github.event.inputs.environment || 'lab' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/provider-mirror
      - name: Create saved plan
        id: plan
        uses: ./.github/actions/plan
        with:
          terraform_version: ${{ env.TF_VERSION }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          backend_resource_group: ${{ secrets.TF_STATE_RG }}
          backend_storage_account: ${{ secrets.TF_STATE_SA }}
          state_key: ${{ env.ENVIRONMENT }}.terraform.tfstate
          var_file: environments/${{ env.ENVIRONMENT }}.tfvars
          environment: ${{ env.ENVIRONMENT }}

  plan-policy-check:
    name: Plan Policy Checks
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.result == 'success'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: ./.github/actions/provider-mirror
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}-${{ github.sha }}
          path: .
      - uses: ./.github/actions/policy-check
        with:
          policy_dir: policies
          soft_fail: 'false'

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [plan, plan-policy-check]
    if: |
      needs.plan.result == 'success' &&
      needs.plan-policy-check.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      github.event.inputs.action == 'apply'
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Back up state
        uses: ./.github/actions/state-backup
        with:
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          storage_account: ${{ secrets.TF_STATE_SA }}
          resource_group: ${{ secrets.TF_STATE_RG }}
          state_key: ${{ env.ENVIRONMENT }}.terraform.tfstate
      - uses: ./.github/actions/provider-mirror
      - uses: ./.github/actions/apply
        with:
          terraform_version: ${{ env.TF_VERSION }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          backend_resource_group: ${{ secrets.TF_STATE_RG }}
          backend_storage_account: ${{ secrets.TF_STATE_SA }}
          state_key: ${{ env.ENVIRONMENT }}.terraform.tfstate
          environment: ${{ env.ENVIRONMENT }}
          plan_artifact: tfplan-${{ env.ENVIRONMENT }}-${{ github.sha }}

  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      github.event.inputs.action == 'destroy' &&
      github.event.inputs.destroy_confirm == format('DESTROY {0}', github.event.inputs.environment)
    environment: ${{ github.event.inputs.environment }}-destroy
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Back up state
        uses: ./.github/actions/state-backup
        with:
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          storage_account: ${{ secrets.TF_STATE_SA }}
          resource_group: ${{ secrets.TF_STATE_RG }}
          state_key: ${{ env.ENVIRONMENT }}.terraform.tfstate
      - uses: ./.github/actions/provider-mirror
      - uses: ./.github/actions/destroy
        with:
          terraform_version: ${{ env.TF_VERSION }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          backend_resource_group: ${{ secrets.TF_STATE_RG }}
          backend_storage_account: ${{ secrets.TF_STATE_SA }}
          state_key: ${{ env.ENVIRONMENT }}.terraform.tfstate
          var_file: environments/${{ env.ENVIRONMENT }}.tfvars
          environment: ${{ env.ENVIRONMENT }}
          confirm: ${{ github.event.inputs.destroy_confirm }}
